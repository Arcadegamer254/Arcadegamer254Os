name: Build Arch Linux ISO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso git make awk

      - name: Setup archiso profile
        run: |
          cp -r /usr/share/archiso/configs/releng ./archiso-profile
          
          # Add extra packages for drivers, VM support, and our OS
          cat <<EOF >> ./archiso-profile/packages.x86_64
          # Drivers & Firmware (Bare Metal)
          linux-firmware
          mesa
          xf86-video-amdgpu
          xf86-video-ati
          xf86-video-intel
          xf86-video-nouveau
          nvidia
          nvidia-utils
          broadcom-wl
          
          # VM Support (Fixing booting in VMs)
          virtualbox-guest-utils
          qemu-guest-agent
          spice-vdagent
          xf86-video-vmware
          
          # Networking & Bluetooth
          networkmanager
          wpa_supplicant
          wireless_tools
          bluez
          bluez-utils
          
          # Base OS dependencies
          nodejs
          npm
          xorg-server
          xorg-xinit
          EOF

      - name: Check for possible errors (Validate Packages)
        run: |
          echo "Validating packages..."
          MISSING_PACKAGES=0
          for pkg in $(cat ./archiso-profile/packages.x86_64 | grep -v '^#' | grep -v '^$'); do
            if ! pacman -Si $pkg >/dev/null 2>&1; then
              echo "::error::Package $pkg not found in repositories"
              MISSING_PACKAGES=$((MISSING_PACKAGES + 1))
            fi
          done
          
          if [ $MISSING_PACKAGES -gt 0 ]; then
            echo "::error::Found $MISSING_PACKAGES missing packages. Failing build."
            exit 1
          else
            echo "All packages validated successfully."
          fi

      - name: Build ISO
        run: |
          mkarchiso -v -w /tmp/archiso-tmp -o ./out ./archiso-profile

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-linux-custom-iso
          path: ./out/*.iso
          if-no-files-found: error
